name: build-firmware

# 打 v* tag(如 git tag v1.0 && git push --tags)→ 构建 GeekTool.bin → 传到同名 Release。
# 设备端 OTA_URL 指向 releases/latest/download/GeekTool.bin,点 update 即拉这里最新的 bin。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:      # 也可在 Actions 页面手动触发(手动跑不发 Release,只验证能否构建)

permissions:
  contents: write         # 建 Release / 传资产需要

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ★拉全历史 + tag:esp_app_desc 的版本号来自 git describe,浅克隆会变 unknown

      - name: Build (ESP-IDF v6.0.1, esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1   # 若该镜像拉取失败,改成 release-v6.0
          target: esp32s3
          path: GeekTool-IDF        # 固件工程在子目录;sdkconfig 被 gitignore,CI 从 sdkconfig.defaults 重生成

      - name: Publish firmware to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GeekTool-IDF/build/GeekTool.bin
          fail_on_unmatched_files: true   # bin 没生成就让工作流红掉,别发空 Release

      # 国内分发:传到 Cloudflare R2(S3 兼容接口),设备从 ota.miaozong.cc 直链拉(GitHub 资产国内常被墙)。
      # 覆盖同名对象 GeekTool.bin → always-latest;Cache-Control:no-store 让边缘不缓存,永远拉最新(免设缓存规则)。
      # 只需 2 个 Secret(R2 → Manage R2 API Tokens 建 Object Read & Write 令牌):R2_ACCESS_KEY_ID、R2_SECRET_ACCESS_KEY。
      # account id + 桶名非敏感(本就在 S3 endpoint 里),直接写死。
      - name: Upload firmware to Cloudflare R2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3api put-object \
            --endpoint-url "https://cd87480e09b939c24f041bc003e5391d.r2.cloudflarestorage.com" \
            --bucket geektool-fw \
            --key GeekTool.bin \
            --body GeekTool-IDF/build/GeekTool.bin \
            --content-type application/octet-stream \
            --cache-control "no-store, max-age=0"
